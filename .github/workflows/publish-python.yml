name: Publish Python Packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        type: choice
        required: true
        default: both
        options:
          - devguard-core
          - devguard-ai-validator
          - both
      repository:
        description: "Target repository"
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi
      auth_mode:
        description: "Publishing auth mode"
        type: choice
        required: true
        default: token
        options:
          - token
          - trusted

permissions:
  contents: read
  id-token: write

jobs:
  publish-devguard-core:
    if: ${{ github.event.inputs.package == 'devguard-core' || github.event.inputs.package == 'both' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build modules/devguard-core --outdir dist/devguard-core
          python -m twine check dist/devguard-core/*

      - name: Validate publish credentials (token mode)
        if: ${{ github.event.inputs.auth_mode == 'token' }}
        run: |
          if [ "${{ github.event.inputs.repository }}" = "testpypi" ] && [ -z "${{ secrets.TEST_PYPI_API_TOKEN }}" ]; then
            echo "Missing TEST_PYPI_API_TOKEN secret. Add it in repository secrets."
            exit 1
          fi
          if [ "${{ github.event.inputs.repository }}" = "pypi" ] && [ -z "${{ secrets.PYPI_API_TOKEN }}" ]; then
            echo "Missing PYPI_API_TOKEN secret. Add it in repository secrets."
            exit 1
          fi

      - name: Publish to TestPyPI (token)
        if: ${{ github.event.inputs.repository == 'testpypi' && github.event.inputs.auth_mode == 'token' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/devguard-core/
          attestations: false

      - name: Publish to PyPI (token)
        if: ${{ github.event.inputs.repository == 'pypi' && github.event.inputs.auth_mode == 'token' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/devguard-core/
          attestations: false

      - name: Publish to TestPyPI (trusted)
        if: ${{ github.event.inputs.repository == 'testpypi' && github.event.inputs.auth_mode == 'trusted' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/devguard-core/

      - name: Publish to PyPI (trusted)
        if: ${{ github.event.inputs.repository == 'pypi' && github.event.inputs.auth_mode == 'trusted' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/devguard-core/

  publish-devguard-ai-validator:
    if: ${{ github.event.inputs.package == 'devguard-ai-validator' || github.event.inputs.package == 'both' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build modules/devguard-ai-validator --outdir dist/devguard-ai-validator
          python -m twine check dist/devguard-ai-validator/*

      - name: Validate publish credentials (token mode)
        if: ${{ github.event.inputs.auth_mode == 'token' }}
        run: |
          if [ "${{ github.event.inputs.repository }}" = "testpypi" ] && [ -z "${{ secrets.TEST_PYPI_API_TOKEN }}" ]; then
            echo "Missing TEST_PYPI_API_TOKEN secret. Add it in repository secrets."
            exit 1
          fi
          if [ "${{ github.event.inputs.repository }}" = "pypi" ] && [ -z "${{ secrets.PYPI_API_TOKEN }}" ]; then
            echo "Missing PYPI_API_TOKEN secret. Add it in repository secrets."
            exit 1
          fi

      - name: Publish to TestPyPI (token)
        if: ${{ github.event.inputs.repository == 'testpypi' && github.event.inputs.auth_mode == 'token' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/devguard-ai-validator/
          attestations: false

      - name: Publish to PyPI (token)
        if: ${{ github.event.inputs.repository == 'pypi' && github.event.inputs.auth_mode == 'token' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/devguard-ai-validator/
          attestations: false

      - name: Publish to TestPyPI (trusted)
        if: ${{ github.event.inputs.repository == 'testpypi' && github.event.inputs.auth_mode == 'trusted' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/devguard-ai-validator/

      - name: Publish to PyPI (trusted)
        if: ${{ github.event.inputs.repository == 'pypi' && github.event.inputs.auth_mode == 'trusted' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/devguard-ai-validator/
