name: Publish Python Packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        type: choice
        required: true
        default: both
        options:
          - devguard-core
          - devguard-ai-validator
          - both
      repository:
        description: "Target repository"
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi

permissions:
  contents: read
  id-token: write

jobs:
  publish-devguard-core:
    if: ${{ github.event.inputs.package == 'devguard-core' || github.event.inputs.package == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build modules/devguard-core --outdir dist/devguard-core
          python -m twine check dist/devguard-core/*

      - name: Publish to TestPyPI
        if: ${{ github.event.inputs.repository == 'testpypi' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/devguard-core/

      - name: Publish to PyPI
        if: ${{ github.event.inputs.repository == 'pypi' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/devguard-core/

  publish-devguard-ai-validator:
    if: ${{ github.event.inputs.package == 'devguard-ai-validator' || github.event.inputs.package == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build modules/devguard-ai-validator --outdir dist/devguard-ai-validator
          python -m twine check dist/devguard-ai-validator/*

      - name: Publish to TestPyPI
        if: ${{ github.event.inputs.repository == 'testpypi' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/devguard-ai-validator/

      - name: Publish to PyPI
        if: ${{ github.event.inputs.repository == 'pypi' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/devguard-ai-validator/
